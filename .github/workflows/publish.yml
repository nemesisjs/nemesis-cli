# ══════════════════════════════════════════════════════════════════════════════
#  Publish: @nemesis-js/cli
#
#  What this does:
#    1. Bumps the version in package.json.
#    2. Publishes to npm with public access.
#    3. Creates and pushes a git tag  vX.Y.Z.
#
#  How to trigger:
#    Actions tab → "Publish @nemesis-js/cli" → Run workflow → enter version
#
#  Required secret:
#    NPM_TOKEN  — a npm "Automation" token with publish rights
# ══════════════════════════════════════════════════════════════════════════════

name: Publish @nemesis-js/cli

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true
      dry_run:
        description: 'Dry run — skip npm publish and git tag'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: publish-cli
  cancel-in-progress: false

permissions:
  contents: write   # needed to push git tags

jobs:
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ github.event.inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: bun install

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run — skipped npm publish for @nemesis-js/cli@${{ github.event.inputs.version }}"

      - name: Create and push git tag
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="v${VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${VERSION}" || echo "Nothing to commit"
          git tag "${TAG}"
          git push origin HEAD --tags
