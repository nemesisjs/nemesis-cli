# ══════════════════════════════════════════════════════════════════════════════
#  Publish: @nemesisjs/cli
#
#  What this does:
#    1. Temporarily replaces "workspace:*" deps with "latest" so bun install
#       can resolve them from npm (this repo is published standalone).
#    2. Builds the CLI and copies templates into dist/.
#    3. Pins the workspace deps to "^<version>" before publishing, so the
#       published package.json has a correct semver range (not "latest").
#    4. Publishes to npm with public access.
#
#  Note: the CLI has no automated test suite of its own, so there is no
#  separate test job. Add one here when CLI tests are introduced.
#
#  How to trigger:
#    Actions tab → "Publish @nemesisjs/cli" → Run workflow
#
#  Required secret:
#    NPM_TOKEN  — a npm "Automation" token with publish rights
# ══════════════════════════════════════════════════════════════════════════════

name: Publish @nemesisjs/cli

# ── Trigger ───────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build without publishing to npm"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ── Safety: never allow two publish runs at the same time ─────────────────────
concurrency:
  group: publish-cli
  cancel-in-progress: false

# ── Minimal GitHub token permissions ─────────────────────────────────────────
permissions:
  contents: read

# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── Build & Publish ──────────────────────────────────────────────────────────
  #  Uses the "npm" environment — add a required reviewer in repo settings if
  #  you want a manual approval gate before every publish.
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node is required for `npm publish` even though we build with Bun.
      - name: Set up Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # workspace:* won't resolve outside the monorepo — swap to "latest" so
      # bun install can pull the already-published @nemesisjs/* packages from npm.
      - name: Resolve workspace dependencies from npm (use latest published versions)
        run: |
          node -e "
            const fs  = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const section of ['dependencies', 'devDependencies', 'peerDependencies']) {
              for (const [name, val] of Object.entries(pkg[section] ?? {})) {
                if (val === 'workspace:*') pkg[section][name] = 'latest';
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: bun install --no-cache

      # Compiles src/index.ts → dist/index.js and copies all Mustache templates
      # into dist/templates/ so the CLI can read them at runtime.
      - name: Build CLI (compile + copy templates)
        run: bun run build

      # The published package.json should have "^version" ranges, not "latest",
      # so consumers get a predictable dependency — pin them now before publish.
      - name: Pin workspace dependencies to a real semver range for the published package
        run: |
          node -e "
            const fs  = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const ver = pkg.version;
            for (const section of ['dependencies', 'devDependencies', 'peerDependencies']) {
              for (const [name, val] of Object.entries(pkg[section] ?? {})) {
                if (val === 'latest') pkg[section][name] = '^' + ver;
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Pinned workspace deps to ^' + ver);
          "

      - name: Publish to npm
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node  -p "require('./package.json').version")
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          echo "  Package : $PKG_NAME"
          echo "  Version : $PKG_VER"

          if [ "$DRY_RUN" = "true" ]; then
            echo "  Result  : skipped (dry run)"
          else
            npm publish --access public
            echo "  Result  : ✓ published $PKG_NAME@$PKG_VER"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
