# ══════════════════════════════════════════════════════════════════════════════
#  Publish: @nemesisjs/cli
#
#  What this does:
#    1. Builds the CLI — compiles src/index.ts to dist/index.js and copies
#       all Mustache templates into dist/templates/ for runtime access.
#    2. Publishes to npm with public access.
#
#  The CLI has no runtime dependency on @nemesisjs/* packages (it is a pure
#  code-generation tool), so no workspace rewriting is needed.
#
#  Note: no automated test suite exists for the CLI yet. Add a test job here
#  (before the publish job) once CLI tests are introduced.
#
#  How to trigger:
#    Actions tab → "Publish @nemesisjs/cli" → Run workflow
#
#  Required secret:
#    NPM_TOKEN  — a npm "Automation" token with publish rights
# ══════════════════════════════════════════════════════════════════════════════

name: Publish @nemesisjs/cli

# ── Trigger ───────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build without publishing to npm"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ── Safety: never allow two publish runs at the same time ─────────────────────
concurrency:
  group: publish-cli
  cancel-in-progress: false

# ── Minimal GitHub token permissions ─────────────────────────────────────────
permissions:
  contents: read

# ══════════════════════════════════════════════════════════════════════════════
jobs:
  # ── Build & Publish ──────────────────────────────────────────────────────────
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node is required for `npm publish` even though we build with Bun.
      - name: Set up Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      # Compiles src/index.ts → dist/index.js and copies all Mustache templates
      # into dist/templates/ so the CLI binary can read them at runtime.
      - name: Build CLI (compile + copy templates)
        run: bun run build

      - name: Publish to npm
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node  -p "require('./package.json').version")
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          echo "  Package : $PKG_NAME"
          echo "  Version : $PKG_VER"

          if [ "$DRY_RUN" = "true" ]; then
            echo "  Result  : skipped (dry run)"
          else
            npm publish --access public
            echo "  Result  : ✓ published $PKG_NAME@$PKG_VER"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
